<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Middle-earth Atlas (Nerd Mode)</title>

  <!-- Leaflet (map engine) -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
    defer
  ></script>

  <link rel="stylesheet" href="./styles.css" />
  <script src="./app.js" defer></script>
</head>

<body>
  <div class="app">
    <aside class="panel">
      <header class="panel__header">
        <div class="title">
          <div class="title__main">Middle-earth Atlas</div>
          <div class="title__sub">Zoom • Search • Journeys</div>
        </div>
      </header>

      <section class="controls">
        <label class="label" for="search">Search locations</label>
        <input id="search" class="input" placeholder="e.g., Rivendell, Minas Tirith..." />

        <label class="label" for="era">Era</label>
        <select id="era" class="select">
          <option value="all">All eras</option>
          <option value="first">First Age</option>
          <option value="second">Second Age</option>
          <option value="third">Third Age</option>
          <option value="fourth">Fourth Age</option>
        </select>
        <div id="journeys-container"></div>

        <div class=”controls__footer”>
          <button id=”reset” class=”btn” title=”Reset filters and view”>Reset</button>
        </div>
      </section>

      <section class="details" id="details">
        <div class="details__empty">
          Click a marker to see lore.
        </div>
      </section>

      <footer class="panel__footer muted">
        Local-only nerd project • Leaflet image overlay
      </footer>
    </aside>

    <main class="mapWrap">
      <div class="age-selector-wrap">
        <select id="ageSelector">
          <option value="third">Third Age</option>
          <option value="first">Beleriand (First Age)</option>
          <option value="second">Númenor</option>
        </select>
      </div>
      <button id="menuToggle" class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">&#9776;</button>
      <div id="map"></div>
    </main>
  </div>
</body>
</html>
